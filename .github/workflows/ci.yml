name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
      - name: Install pinned Stockfish 18
        run: |
          stockfish_archive="$RUNNER_TEMP/stockfish-18.tar"
          stockfish_dir="$RUNNER_TEMP/stockfish"
          curl --fail --location --retry 3 --output "$stockfish_archive" "https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64.tar"
          echo "5c6f38b02a4da5f3ffe763f27da6c3e743eebefd92b50cb3661623b96696adff  $stockfish_archive" | sha256sum --check
          mkdir "$stockfish_dir"
          tar --extract --file "$stockfish_archive" --directory "$stockfish_dir" --strip-components=1
          mv "$stockfish_dir/stockfish-ubuntu-x86-64" "$stockfish_dir/stockfish"
          echo "$stockfish_dir" >> "$GITHUB_PATH"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.3
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Sync Python dependencies
        run: uv sync --frozen --all-groups
      - name: Install frontend dependencies
        run: pnpm --dir apps/scan64-web install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --dir apps/scan64-web exec playwright install --with-deps chromium
      - name: Run repository quality gate
        run: scripts/check.sh
