name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Stockfish
        run: |
          wget https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64-avx2.tar
          tar -xf stockfish-ubuntu-x86-64-avx2.tar
          sudo mv stockfish/stockfish-ubuntu-x86-64-avx2 /usr/local/bin/stockfish
          sudo chmod +x /usr/local/bin/stockfish

      - name: Run verification script
        run: ./scripts/check.sh
