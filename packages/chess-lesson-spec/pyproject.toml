[project]
name = "chess-lesson-spec"
version = "0.1.0"
description = "Portable Pydantic models for the Scan64 LessonSpec protocol"
readme = "README.md"
requires-python = ">=3.12"
license = "GPL-3.0-or-later"
license-files = ["LICENSE"]
dependencies = [
    "pydantic>=2.13.4",
]

[project.scripts]
scan64-conformance = "chess_lesson_spec.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/chess_lesson_spec"]
